<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yycchatgo-一个安静的角落</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: { 100: '#f5f5f5', 200: '#e0e0e0', 800: '#222', 900: '#000' }
                    },
                    fontFamily: { sans: ['Inter','system-ui'] }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            /* 全屏聊天界面 - 占满整个网页 */
            .chat-fullscreen {
                @apply w-screen h-screen fixed inset-0 bg-theme-100 flex flex-col;
            }
            /* 消息区域 - 撑满全屏剩余空间 */
            .msg-container {
                @apply flex-1 overflow-y-auto p-4 bg-theme-100 space-y-3;
            }
            /* 消息气泡 */
            .msg-self {
                @apply max-w-[85%] px-3 py-2 rounded-md bg-black text-white ml-auto rounded-br-none;
            }
            .msg-other {
                @apply max-w-[85%] px-3 py-2 rounded-md bg-white border border-theme-200 mr-auto rounded-bl-none;
            }
            /* 底部输入栏 */
            .chat-input {
                @apply flex items-center p-3 border-t border-theme-200 bg-white;
            }
            /* 通用输入框 */
            .input-primary {
                @apply w-full px-4 py-2 border border-theme-200 rounded-md focus:outline-none focus:ring-1 focus:ring-black;
            }
            /* 通用按钮 */
            .btn-primary {
                @apply bg-black text-white px-4 py-2 rounded-md hover:bg-theme-800 transition-colors;
            }
            /* 右上角在线面板 */
            .online-widget {
                @apply fixed top-4 right-4 w-48 bg-white border border-theme-200 rounded-md p-3 shadow-lg z-50;
            }
            /* 步骤面板 - 全屏居中，互斥显示 */
            .step-panel {
                @apply fixed inset-0 w-screen h-screen flex items-center justify-center bg-theme-100 z-10;
            }
            .step-card {
                @apply w-full max-w-sm p-6 bg-white border border-theme-200 rounded-md mx-4;
            }
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden">

<!-- 在线用户面板（右上角悬浮，聊天时显示） -->
<div id="onlinePanel" class="online-widget hidden">
    <div class="text-sm font-medium mb-1">在线成员 <span id="onlineCount">0</span> 人</div>
    <div id="userList" class="text-xs space-y-1 max-h-32 overflow-y-auto"></div>
</div>

<!-- 第一步：登录（仅用户名） -->
<div id="loginPage" class="step-panel">
    <div class="step-card">
        <h2 class="text-lg font-semibold text-center mb-4">用户登录</h2>
        <div class="flex flex-col space-y-4">
            <input type="text" id="username" placeholder="请输入你的昵称" class="input-primary">
            <button id="loginBtn" class="btn-primary">确认登录</button>
        </div>
    </div>
</div>

<!-- 第二步：选择房间（登录后显示，聊天前完全隐藏） -->
<div id="roomPage" class="step-panel hidden">
    <div class="step-card">
        <h2 class="text-lg font-semibold text-center mb-4">进入聊天室</h2>
        <div class="flex flex-col space-y-4">
            <input type="text" id="roomName" placeholder="输入房间名称" class="input-primary" value="default">
            <button id="roomBtn" class="btn-primary">进入聊天</button>
        </div>
    </div>
</div>

<!-- 第三步：全屏聊天界面（进入房间前 完全隐藏+不占位） -->
<div id="chatPage" class="chat-fullscreen hidden">
    <!-- 消息区域 -->
    <div id="msgContainer" class="msg-container"></div>
    <!-- 输入区域 -->
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="输入消息..." class="input-primary">
        <button id="sendBtn" class="btn-primary ml-2">发送</button>
    </div>
</div>

<script>
    // 全局状态
    let username = null;
    let roomName = null;
    let socket = null;
    let onlineUsers = new Set();

    // DOM元素
    const loginPage = document.getElementById('loginPage');
    const roomPage = document.getElementById('roomPage');
    const chatPage = document.getElementById('chatPage');
    const onlinePanel = document.getElementById('onlinePanel');

    // —————— 1. 登录流程 ——————
    document.getElementById('loginBtn').addEventListener('click', toRoomPage);
    document.getElementById('username').addEventListener('keypress', (e) => e.key === 'Enter' && toRoomPage());
    function toRoomPage() {
        const val = document.getElementById('username').value.trim();
        if (!val) { alert('请输入昵称'); return; }
        username = val;
        loginPage.classList.add('hidden');  // 隐藏登录
        roomPage.classList.remove('hidden');// 显示房间
    }

    // —————— 2. 进入房间流程 ——————
    document.getElementById('roomBtn').addEventListener('click', toChat);
    document.getElementById('roomName').addEventListener('keypress', (e) => e.key === 'Enter' && toChat());
    function toChat() {
        const val = document.getElementById('roomName').value.trim();
        if (!val) { alert('请输入房间名'); return; }
        roomName = val;
        roomPage.classList.add('hidden');   // 隐藏房间
        chatPage.classList.remove('hidden');// 显示全屏聊天
        onlinePanel.classList.remove('hidden');// 显示在线面板
        connectSocket(); // 连接聊天
    }

    // —————— 3. WebSocket连接 ——————
    function connectSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${window.location.host}/chat/${roomName}?username=${encodeURIComponent(username)}`);

        // 连接成功
        socket.onopen = () => {
            document.getElementById('msgInput').focus();
            document.getElementById('msgContainer').innerHTML = '';
        };

        // 接收消息
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'online') {
                onlineUsers = new Set(data.users);
                renderOnline();
                return;
            }
            if (data.type === 'message') {
                addMessage(data);
            }
        };

        // 断开连接
        socket.onclose = () => {
            alert('已断开连接，即将刷新');
            window.location.reload();
        };
    }

    // —————— 4. 发送消息 ——————
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());
    function sendMessage() {
        const val = document.getElementById('msgInput').value.trim();
        if (!val || !socket) return;
        socket.send(JSON.stringify({ type: 'message', text: val }));
        document.getElementById('msgInput').value = '';
    }

    // —————— 5. 渲染消息 ——————
    function addMessage(data) {
        const container = document.getElementById('msgContainer');
        const isSelf = data.username === username;
        const div = document.createElement('div');
        div.className = isSelf ? 'msg-self' : 'msg-other';
        
        const time = new Date(data.timestamp).toLocaleTimeString();
        div.innerHTML = `<div class="text-xs opacity-70">${data.username} · ${time}</div>${escapeHtml(data.text)}`;
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // —————— 6. 渲染在线用户 ——————
    function renderOnline() {
        document.getElementById('onlineCount').textContent = onlineUsers.size;
        const list = document.getElementById('userList');
        list.innerHTML = '';
        onlineUsers.forEach(user => {
            const item = document.createElement('div');
            item.textContent = user;
            list.appendChild(item);
        });
    }

    // XSS防护
    function escapeHtml(unsafe) {
        return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
